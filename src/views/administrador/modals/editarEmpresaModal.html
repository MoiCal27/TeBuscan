<div class="modal-overlay" id="modalEditarEmpresa">
    <div class="modal-box" style="max-width:600px;max-height:90vh;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Editar</h2>
            <button onclick="cerrarModalEditarEmpresa()" style="background:transparent;border:none;font-size:1.3rem;color:#9aabba;cursor:pointer;">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                 style="width:64px;height:64px;background:#F0F5FB;">
                <i class="bi bi-building" style="font-size:1.8rem;color:#6B9BD9"></i>
            </div>
            <div>
                <div class="fw-bold" id="modal-edit-emp-nombre" style="font-size:1.1rem;font-family:'Poppins',sans-serif;"></div>
                <div class="d-flex align-items-center gap-1 mt-1">
                    <i class="bi bi-star-fill" style="color:#FDC700;font-size:.85rem;"></i>
                    <span class="fw-semibold small" id="modal-edit-emp-rating"></span>
                    <span class="text-muted small" id="modal-edit-emp-valoraciones"></span>
                </div>
            </div>
        </div>

        <div class="border rounded-3 p-3 mb-3" style="background:#f8fbfd;">
            <div class="fw-semibold small mb-3">Información general</div>
            <div class="d-flex align-items-center gap-2 text-muted small mb-2">
                <i class="bi bi-briefcase"></i>
                <span>Industria: <span id="modal-edit-emp-industria"></span></span>
            </div>
            <div class="d-flex align-items-center gap-2 text-muted small mb-2">
                <i class="bi bi-people"></i>
                <span>Tamaño: <span id="modal-edit-emp-tamano"></span></span>
            </div>
            <div class="d-flex align-items-center gap-2 text-muted small mb-2">
                <i class="bi bi-geo-alt"></i>
                <span>Ubicación: <span id="modal-edit-emp-ubicacion"></span></span>
            </div>
            <p class="text-muted small mb-0 mt-2" id="modal-edit-emp-descripcion"></p>
        </div>

        <div class="border rounded-3 p-3 mb-3" style="background:#f8fbfd;">
            <div class="fw-semibold small mb-3">Estadísticas</div>
            <div class="row g-2">
                <div class="col-4">
                    <div class="rounded-3 p-3 text-center" style="background:#F0F5FB;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                        <div class="fw-bold" id="modal-edit-emp-empleos" style="font-size:1.3rem;color:#6B9BD9;"></div>
                        <div class="text-muted" style="font-size:.75rem;">Empleos activos</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="rounded-3 p-3 text-center" style="background:#FFF3EE;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                        <div class="fw-bold" id="modal-edit-emp-candidatos" style="font-size:1.3rem;color:#FF9B7D;"></div>
                        <div class="text-muted" style="font-size:.75rem;">Candidatos totales</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="rounded-3 p-3 text-center" style="background:#F2FBFD;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                        <div class="fw-bold" id="modal-edit-emp-total-val" style="font-size:1.3rem;color:#7DD3E8;"></div>
                        <div class="text-muted" style="font-size:.75rem;">Valoraciones</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="border rounded-3 p-3 mb-3" style="background:#f8fbfd;">
            <div class="fw-semibold small mb-3"><i class="bi bi-activity me-1"></i>Actividad reciente</div>
            <div class="d-flex justify-content-between small text-muted py-2 border-bottom">
                <span>Última oferta publicada</span>
                <span id="modal-edit-emp-ultima-oferta">-</span>
            </div>
            <div class="d-flex justify-content-between small text-muted py-2 border-bottom">
                <span>Último candidato contratado</span>
                <span id="modal-edit-emp-ultimo-contratado">-</span>
            </div>
            <div class="d-flex justify-content-between small text-muted py-2">
                <span>Cuenta creada</span>
                <span id="modal-edit-emp-creacion">-</span>
            </div>
        </div>

        <div class="border rounded-3 p-3 mb-4" style="background:#f8fbfd;">
            <div class="fw-semibold small mb-3">Acciones rápidas</div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-secondary btn-sm rounded-2" style="font-size:.8rem;"
                    onclick="verEmpleosEmpresa()">Ver empleos publicados</button>
                <button class="btn btn-outline-secondary btn-sm rounded-2" style="font-size:.8rem;"
                    onclick="verPerfilEmpresa()">Ver perfil público</button>
            </div>
        </div>

        <div class="border rounded-3 p-3 mb-4" style="background:#f8fbfd;">
            <div class="fw-semibold small mb-3">Cambiar estado de la empresa</div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="pec-btn-estado" data-estado="activo" onclick="seleccionarEstadoEmpresa(this)">Activo</button>
                <button class="pec-btn-estado" data-estado="inactivo" onclick="seleccionarEstadoEmpresa(this)">Inactivo</button>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button onclick="cerrarModalEditarEmpresa()" class="btn btn-outline-secondary rounded-2 px-4">Cancelar</button>
            <button onclick="guardarCambiosEmpresa()" class="btn-coral">Guardar cambios</button>
        </div>
    </div>
</div>
