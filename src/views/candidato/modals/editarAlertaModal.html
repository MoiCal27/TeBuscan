<div class="modal-overlay" id="modalEditarAlerta">
  <div class="modal-box">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2>Editar alerta de trabajo</h2>
      <button onclick="cerrarModalEditarAlerta()" style="background:transparent;border:none;font-size:1.3rem;color:#9aabba;cursor:pointer;line-height:1;">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <p class="modal-sub">Actualiza los criterios de tu alerta de empleo</p>

    <div class="modal-section">
      <div class="mb-3">
        <label class="field-label">Palabra clave *</label>
        <input id="editar-palabra_clave" type="text" class="field-input" placeholder="Ej: Desarrollador Full Stack" />
        <span class="field-error" id="error-editar-palabra_clave"></span>
      </div>
      <div class="mb-3">
        <label class="field-label">Ubicación</label>
        <input id="editar-ubicacion" type="text" class="field-input" placeholder="Ej: Madrid, Remoto" />
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="field-label">Frecuencia</label>
          <select id="editar-frecuencia" class="field-input">
            <option value="Diario">Diario</option>
            <option value="Semanal">Semanal</option>
            <option value="Mensual">Mensual</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="field-label">Tipo de empleo</label>
          <select id="editar-tipo_empleo" class="field-input">
            <option value="">Selecciona...</option>
            <option value="Tiempo completo">Tiempo completo</option>
            <option value="Tiempo parcial">Tiempo parcial</option>
            <option value="Freelance">Freelance</option>
            <option value="Prácticas">Prácticas</option>
          </select>
        </div>
      </div>
      <div class="mb-1">
        <label class="field-label">Salario mínimo (opcional)</label>
        <input id="editar-salario_minimo" type="number" class="field-input" placeholder="Ej: 30000" />
      </div>
    </div>

    <div class="d-flex justify-content-end align-items-center gap-3 mt-3">
      <button onclick="cerrarModalEditarAlerta()" class="btn btn-outline-secondary rounded-3 px-4 py-2" style="font-size:0.88rem;height:45px;">
        Cancelar
      </button>
      <a href="#" class="btn-coral" onclick="guardarEdicionAlerta(); return false;">
        Guardar cambios
      </a>
    </div>
  </div>
</div>
