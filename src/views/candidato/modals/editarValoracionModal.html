<div class="modal-overlay" id="modalEditarValoracion">
  <div class="modal-box">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Editar valoración de empresa</h2>
      <button
        onclick="cerrarModalEditarValoracion()"
        style="
          background: transparent;
          border: none;
          font-size: 1.3rem;
          color: #9aabba;
          cursor: pointer;
          line-height: 1;
        "
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-section">
      <div class="mb-3">
        <label class="field-label">Nombre de la empresa *</label>
        <input
          id="editar-val-empresa-nombre"
          type="text"
          class="field-input"
          disabled
          style="opacity: 0.6; cursor: not-allowed; background: #f8fbfd"
        />
      </div>
      <div class="mb-3">
        <label class="field-label">Puesto que ocupaste *</label>
        <input
          id="editar-val-puesto"
          type="text"
          class="field-input"
          placeholder="Ej: Desarrollador Full Stack"
        />
        <span class="field-error" id="error-editar-val-puesto"></span>
      </div>
      <div class="mb-3">
        <label class="field-label">Período de trabajo</label>
        <input
          id="editar-val-periodo"
          type="text"
          class="field-input"
          placeholder="Ej: Enero 2020 - Marzo 2022"
        />
        <span class="field-error" id="error-editar-val-periodo"></span>
      </div>
      <div class="mb-3">
        <label class="field-label">Calificación *</label>
        <div class="d-flex align-items-center gap-3">
          <div
            id="editar-val-estrellas"
            class="d-flex gap-1"
            style="font-size: 1.6rem; cursor: pointer"
          >
            <i class="bi bi-star" data-val="1" style="color: #fdc700"></i>
            <i class="bi bi-star" data-val="2" style="color: #fdc700"></i>
            <i class="bi bi-star" data-val="3" style="color: #fdc700"></i>
            <i class="bi bi-star" data-val="4" style="color: #fdc700"></i>
            <i class="bi bi-star" data-val="5" style="color: #fdc700"></i>
          </div>
        </div>
        <input type="hidden" id="editar-val-calificacion" value="0" />
        <span class="field-error" id="error-editar-val-calificacion"></span>
      </div>
      <div class="mb-1">
        <label class="field-label">Tu opinión *</label>
        <textarea
          id="editar-val-comentario"
          class="field-input"
          rows="3"
          placeholder="Comparte tu experiencia trabajando en esta empresa..."
        ></textarea>
        <div style="font-size: 0.78rem; color: #9aabba; margin-top: 4px">
          Mínimo 50 caracteres
        </div>
        <span class="field-error" id="error-editar-val-comentario"></span>
      </div>
    </div>

    <div class="d-flex justify-content-end align-items-center gap-3 mt-3">
      <button
        onclick="cerrarModalEditarValoracion()"
        class="btn btn-outline-secondary rounded-3 px-4 py-2"
        style="font-size: 0.88rem; height: 45px"
      >
        Cancelar
      </button>
      <a
        href="#"
        class="btn-coral"
        onclick="
          guardarEdicionValoracion();
          return false;
        "
      >
        Guardar Cambios
      </a>
    </div>
  </div>
</div>
