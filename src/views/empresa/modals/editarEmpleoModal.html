<div class="modal-overlay" id="modalEditar">
  <div class="modal-box">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2>Editar empleo</h2>
      <button onclick="cerrarModalEditar()" style="background:transparent;border:none;font-size:1.3rem;color:#9aabba;cursor:pointer;line-height:1;">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <p class="modal-sub">Actualiza la información de tu oferta de empleo</p>

    <div class="mb-3">
      <label class="field-label">Título del puesto *</label>
      <input type="text" class="field-input" value="Desarrollador Full Stack" />
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="field-label">Ubicación *</label>
        <input type="text" class="field-input" value="Madrid, España" />
      </div>
      <div class="col-md-6">
        <label class="field-label">Tipo de empleo *</label>
        <select class="field-input">
          <option selected>Tiempo completo</option>
          <option>Tiempo parcial</option>
          <option>Freelance</option>
          <option>Prácticas</option>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <label class="field-label">Salario</label>
      <input type="text" class="field-input" value="35.000€ - 45.000€" />
    </div>
    <div class="mb-3">
      <label class="field-label">Descripción del puesto *</label>
      <textarea class="field-input">Buscamos un desarrollador full stack con experiencia en React y Node.js para unirse a nuestro equipo dinámico.</textarea>
    </div>
    <div class="mb-3">
      <label class="field-label">Requisitos</label>
      <textarea class="field-input" placeholder="Lista los requisitos del puesto..."></textarea>
    </div>

    <div class="d-flex justify-content-end align-items-center gap-3 mt-3">
  <button onclick="cerrarModalEditar()" class="btn btn-outline-secondary rounded-3 px-4 py-2" style="font-size:0.88rem; height: 45px;">
    Cancelar
  </button>
  <a href="#" class="btn-coral rounded-3" style="width:auto;padding:12px 24px;" onclick="cerrarModalEditar()">
    Guardar cambios
  </a>
</div>
  </div>
</div>
