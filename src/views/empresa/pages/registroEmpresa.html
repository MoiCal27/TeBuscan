<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeBuscan - Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-page">

      <div class="mb-2">
        <img src="/images/Logo_TeBuscan.png" alt="TeBuscan" height="50" />
      </div>
      <p class="auth-subtitle">Crea tu cuenta y comienza hoy</p>

      <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <p class="card-sub">Selecciona tu tipo de cuenta</p>

        <div class="type-tabs">
          <button class="type-tab" id="tab-candidato" onclick="switchTab('candidato')">
            <i class="bi bi-person-badge"></i> Candidato
          </button>
          <button class="type-tab active" id="tab-empresa" onclick="switchTab('empresa')">
            <i class="bi bi-building"></i> Empresa
          </button>
        </div>

        <!-- CANDIDATO -->
        <div class="tab-content-pane" id="pane-candidato">
          <div class="mb-3">
            <label class="field-label">Nombre completo</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-person"></i></span>
              <input type="text" placeholder="Tu nombre completo" />
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Correo electrónico</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-envelope"></i></span>
              <input type="email" placeholder="tucorreo@email.com" />
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Teléfono</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-telephone"></i></span>
              <input type="tel" placeholder="+34 600 000 000" />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="field-label">Contraseña</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="pass-c" placeholder="••••••••" />
                <button class="eye-btn" onclick="togglePass('pass-c',this)"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="col-6">
              <label class="field-label">Confirmar contraseña</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="cpass-c" placeholder="••••••••" />
                <button class="eye-btn" onclick="togglePass('cpass-c',this)"><i class="bi bi-eye"></i></button>
              </div>
            </div>
          </div>
          <button class="btn-submit">Crear cuenta de candidato</button>
        </div>

        <!-- EMPRESA -->
        <div class="tab-content-pane active" id="pane-empresa">
          <div class="mb-3">
            <label class="field-label">Nombre de la empresa</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-building"></i></span>
              <input type="text" placeholder="Mi Empresa S.L." />
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Nombre de contacto</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-person"></i></span>
              <input type="text" placeholder="Responsable de RRHH" />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-7">
              <label class="field-label">Correo corporativo</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-envelope"></i></span>
                <input type="email" placeholder="empresa@company.com" />
              </div>
            </div>
            <div class="col-md-5">
              <label class="field-label">Teléfono</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-telephone"></i></span>
                <input type="tel" placeholder="+34 900 000 000" />
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Ubicación</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-geo-alt"></i></span>
              <input type="text" placeholder="Madrid, España" />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="field-label">Contraseña</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="pass-e" placeholder="••••••••" />
                <button class="eye-btn" onclick="togglePass('pass-e',this)"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="col-6">
              <label class="field-label">Confirmar contraseña</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="cpass-e" placeholder="••••••••" />
                <button class="eye-btn" onclick="togglePass('cpass-e',this)"><i class="bi bi-eye"></i></button>
              </div>
            </div>
          </div>
          <button class="btn-submit">Crear cuenta de empresa</button>
        </div>

        <div class="auth-link-row">
          ¿Ya tienes una cuenta? <a href="inicioSesionEmpresa.html">Inicia sesión</a>
        </div>
      </div>

      <a href="/" class="back-link">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function switchTab(tab) {
        document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content-pane').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('pane-' + tab).classList.add('active');
      }
      function togglePass(id, btn) {
        const inp = document.getElementById(id);
        const isPass = inp.type === 'password';
        inp.type = isPass ? 'text' : 'password';
        btn.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
      }
    </script>
  </body>
</html>
