<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeBuscan - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-page">

      <div class="mb-2">
        <img src="/images/Logo_TeBuscan.png" alt="TeBuscan" height="50" />
      </div>
      <p class="auth-subtitle">Inicia sesión en tu cuenta</p>

      <div class="auth-card">
        <h2>Iniciar Sesión</h2>
        <p class="card-sub">Selecciona tu tipo de cuenta</p>

        <div class="type-tabs">
          <button class="type-tab" id="tab-candidato" onclick="switchTab('candidato')">
            <i class="bi bi-person-badge"></i> Candidato
          </button>
          <button class="type-tab active" id="tab-empresa" onclick="switchTab('empresa')">
            <i class="bi bi-building"></i> Empresa
          </button>
          <button class="type-tab" id="tab-admin" onclick="switchTab('admin')">
            <i class="bi bi-shield-check"></i> Admin
          </button>
        </div>

        <!-- CANDIDATO -->
        <div class="tab-content-pane" id="pane-candidato">
          <div class="mb-3">
            <label class="field-label">Correo electrónico</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-envelope"></i></span>
              <input type="email" placeholder="tucorreo@email.com" />
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Contraseña</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" id="pass-c" placeholder="••••••••" />
              <button class="eye-btn" onclick="togglePass('pass-c',this)"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button class="btn-submit">Iniciar sesión como candidato</button>
          <div class="auth-link-row">¿No tienes una cuenta? <a href="/registro-empresa">Regístrate aquí</a></div>
        </div>

        <!-- EMPRESA -->
      <div class="tab-content-pane active" id="pane-empresa">
        <div class="mb-3">
          <label class="field-label">Correo electrónico corporativo</label>
          <div class="input-wrap" id="wrap-correo_login">
            <span class="input-icon"><i class="bi bi-envelope"></i></span>
            <input id="correo_login" type="email" placeholder="empresa@company.com" />
          </div>
          <span class="field-error" id="error-correo_login"></span>
        </div>
        <div class="mb-3">
          <label class="field-label">Contraseña</label>
          <div class="input-wrap" id="wrap-password_login">
            <span class="input-icon"><i class="bi bi-lock"></i></span>
            <input type="password" id="password_login" placeholder="••••••••" />
            <button type="button" class="eye-btn" id="btn-pass-login"><i class="bi bi-eye"></i></button>
          </div>
          <span class="field-error" id="error-password_login"></span>
        </div>
        <button id="btnLoginEmpresa" type="button" class="btn-submit">Iniciar sesión como empresa</button>
        <div class="auth-link-row">¿No tienes una cuenta? <a href="/registro-empresa">Regístrate aquí</a></div>
      </div>

        <!-- ADMIN -->
        <div class="tab-content-pane" id="pane-admin">
          <div class="mb-3">
            <label class="field-label">Correo electrónico</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-envelope"></i></span>
              <input type="email" placeholder="admin@tebuscan.com" />
            </div>
          </div>
          <div class="mb-3">
            <label class="field-label">Contraseña</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" id="pass-a" placeholder="••••••••" />
              <button class="eye-btn" onclick="togglePass('pass-a',this)"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button class="btn-submit">Iniciar sesión como administrador</button>
          <div class="auth-link-row">Acceso restringido al personal autorizado</div>
        </div>

      </div>

      <a href="/" class="back-link">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/empresa/loginEmpresa.js"></script>
  </body>
</html>
